<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Coche</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="background">
    
    <a href="/manage_cars" class="back-btn">
            ←
    </a>

    <h1>PANEL DE ADMINISTRADOR</h1>
    <h1>EDITAR COCHE</h1>
        
    <div class="Cuerpo"> 
        <h2 style="color:#848484;">Modifica los datos del vehículo</h2>
        <form action="/edit_car/{{ coche.idCoche }}" method="POST" enctype="multipart/form-data" style="gap: 25px;padding: 60px 80px;background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px);border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.6);">
            <input type="text" id="marca" name="marca" required placeholder="MARCA" value="{{ coche.marca }}">
              <input type="text" id="modelo" name="modelo" required placeholder="MODELO" value="{{ coche.modelo }}">
              <input type="number" id="precio" name="precio" required placeholder="PRECIO" step="0.01" value="{{ coche.precio }}">
              <input type="number" id="kilometraje" name="kilometraje" required placeholder="KILOMETRAJE" value="{{ coche.kilometraje }}">
              
              <div class="file-upload">
                  <label for="imagen" class="file-label" id="file-label">
                      SELECCIONAR IMAGEN (OPCIONAL)
                  </label>

                  <input type="file" id="imagen" name="imagen" accept="image/*">
              </div>

              <button type="submit" class="btn">GUARDAR</button>
        </form>
    </div>
    
    <script>
        const input = document.getElementById("imagen");
        const label = document.getElementById("file-label");

        input.addEventListener("change", function() {
            if (this.files.length > 0) {
                label.textContent = "IMAGEN SELECCIONADA";
                label.style = "background: linear-gradient(135deg,#28a745,#a8e6b5,#53c16a,#eefaf0);";
            } else {
                label.textContent = "SELECCIONAR IMAGEN (OPCIONAL)";
            }
        });
    </script>
</body>
</html>
