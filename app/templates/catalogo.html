<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo - Anticongelantes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='signin-reg.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
    <style>
        /* Contenedor para centrar todo el contenido verticalmente */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            min-height: 100vh;
            padding-top: 40px;
        }

        /* Estilo para el título centrado arriba */
        .titulo-catalogo {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 60px;
            color: white;
            letter-spacing: 4px;
            text-shadow: 0 10px 25px rgba(0,0,0,0.9);
            margin-bottom: 50px;
            text-align: center;
            text-transform: uppercase;
        }

        /* Cuadrícula de coches centrada */
        .catalogo-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            width: 95%;
            max-width: 1400px;
            padding-bottom: 50px;
        }

        /* Tarjetas con efecto cristal mejorado */
        .car-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 25px;
            width: 350px;
            text-align: center;
            color: white;
            transition: transform 0.3s ease, background 0.3s ease;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .car-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Ajuste para que las fotos se vean perfectas */
        .car-img {
            width: 100%;
            height: 200px;
            object-fit: contain; /* Evita que las fotos de los coches se corten */
            border-radius: 15px;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .car-price {
            font-size: 28px;
            color: #f2f2f2;
            font-weight: bold;
            margin: 15px 0 5px 0;
        }

        .car-info {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 20px;
        }

        /* Cabecera de usuario arriba a la derecha */
        .nav-header {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            z-index: 100;
        }
    </style>
</head>
<body class="background">
    <div class="nav-header">
        <span>Bienvenido, <strong>{{ usuario.Nombre }}</strong></span> |
        <a href="/logout" style="color: #ff4d4d; text-decoration: none; font-weight: bold;">Cerrar Sesión</a>
    </div>

    <div class="main-wrapper">
        <h1 class="titulo-catalogo">Catálogo de Vehículos</h1>

        <div class="catalogo-container">
            {% for coche in coches %}
            <div class="car-card">
                <img src="{{ url_for('static', filename=coche['imagen']) }}"
                     alt="{{ coche['modelo'] }}" class="car-img"
                     onerror="this.src='/static/fondo.jpg'"> <h2 style="margin: 0;">{{ coche['marca'] }}</h2>
                <p style="opacity: 0.8; font-style: italic;">{{ coche['modelo'] }}</p>

                <div class="car-price">{{ "{:,.0f}".format(coche['precio']) }} €</div>
                <div class="car-info">{{ coche['kilometraje'] }} KM</div>

                <button class="btn" style="width: 100%; font-weight: bold;"
                        onclick="window.location.href='/detalles/{{ coche['idCoche'] }}'">
                    VER DETALLES
                </button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
