<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ChatBot - PimPam</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='chatbot.css') }}">
</head>

<body class="background">

  <!-- Botón volver -->
  <a href="/pokedex" class="back-btn" aria-label="Volver">←</a>

  <div class="chatbot-wrapper">

    <!-- Header -->
    <div class="chatbot-header">
      <div class="chatbot-title">PokeBot – Tu asistente Pokémon</div>
      <div class="chatbot-subtitle">Pregúntame lo que necesites</div>
    </div>

    <!-- Comandos -->
    <div class="commands-panel">
      <div class="cmd-line">/stats &lt;pokémon&gt; → Habilidades y estadísticas</div>
      <div class="cmd-line">/weaknesses &lt;pokémon&gt; → Fortalezas y debilidades</div>
      <div class="cmd-line">/evolution &lt;pokémon&gt; → Cadena evolutiva</div>
      <div class="cmd-line">/score_team &lt;equipo&gt; → Evaluar equipo Pokémon</div>
      <div class="cmd-line">/compare &lt;pokémon1&gt; &lt;pokémon2&gt; → Comparar estadísticas</div>
    </div>

    <!-- Chat -->
    <div class="chat-area" id="chatlog"></div>

    <!-- Input -->
    <div class="input-bar">
      <input id="cmd" type="text" placeholder="Escribe un comando..." autocomplete="off">
      <button id="send" class="send-btn" aria-label="Enviar">➤</button>
    </div>

  </div>

  <!-- ✅ SCRIPT SIEMPRE AQUÍ -->
  <script>
    const chatlog = document.getElementById("chatlog");
    const input = document.getElementById("cmd");
    const btn = document.getElementById("send");

    function addBubble(text, who) {
      const div = document.createElement("div");
      div.className = "bubble " + who;
      div.textContent = text;
      chatlog.appendChild(div);
      chatlog.scrollTop = chatlog.scrollHeight;
    }

    async function enviar() {
      const texto = (input.value || "").trim();
      if (!texto) return;

      addBubble(texto, "user");
      input.value = "";

      const res = await fetch("/chatbot/consultar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ comando: texto })
      });

      const data = await res.json();
      addBubble(data.respuesta || "Error.", "bot");
    }

    btn.addEventListener("click", enviar);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") enviar();
    });
  </script>

</body>
</html>
