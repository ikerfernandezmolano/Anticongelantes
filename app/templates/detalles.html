<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalles - {{ coche.marca }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='signin-reg.css') }}">
    <style>
        .detalles-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .info-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 30px; padding: 40px; max-width: 1000px; display: flex; gap: 40px; color: white; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        .foto-detalle { width: 50%; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4)); }
        .precio-grande { font-size: 45px; color: #00ff88; font-weight: bold; margin: 15px 0; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: rgba(40, 40, 40, 0.95); padding: 30px; border-radius: 20px; border: 1px solid #00ff88; text-align: center; width: 320px; color: white; }
    </style>
</head>
<body class="background">
    <div class="detalles-container">
        <div class="info-card">
            <img src="{{ url_for('static', filename=coche.imagen) }}" class="foto-detalle" onerror="this.src='/static/fondo.jpg'">
            <div class="datos-tecnicos">
                <a href="/catalogo" style="color: #00ff88; font-weight: bold; text-decoration: none;">← VOLVER</a>
                <h1>{{ coche.marca }}</h1>
                <p class="precio-grande">{{ "{:,.0f}".format(coche.precio) | replace(',', '.') }} €</p>
                <ul style="list-style: none; padding: 0; line-height: 2.5;">
                    <li><strong>KM:</strong> {{ coche.kilometraje }}</li>
                    <li><strong>Garantía:</strong> 24 meses</li>
                </ul>
                <button class="btn" onclick="abrirModal()" style="width: 100%; margin-top: 40px;">CONTACTAR ASESOR</button>
            </div>
        </div>
    </div>
    <div id="modalContacto" class="modal-overlay">
        <div class="modal-content">
            <h4>CONTACTO</h4>
            <p>📞 +34 622 45 81 90</p>
            <p>📧 info@anticongelantes.es</p>
            <button class="btn" onclick="cerrarModal()" style="background: #ff4d4d;">CERRAR</button>
        </div>
    </div>
    <script>
        function abrirModal() { document.getElementById('modalContacto').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('modalContacto').style.display = 'none'; }
    </script>
</body>
</html>
