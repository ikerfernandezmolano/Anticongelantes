<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PimPam Pokémon</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>PimPam: Gestión de Pokémon</h1>

    <nav>
        <a href="{{ url_for('pokedex.index') }}">Pokedex</a>
        <a href="{{ url_for('equipos.cargar_equipos') }}">Equipos</a>
        <a href="{{ url_for('changelog.ver_changelog') }}">Changelog</a>
    </nav>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <ul class="messages">
                {% for category, message in messages %}
                    <li class="{{ category }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}

    <hr>

    {% block content %}{% endblock %}
</body>
</html>
