<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo - Anticongelantes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='signin-reg.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
    <style>
        .catalogo-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            margin-top: 20px;
            padding-bottom: 50px;
        }
        .car-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            color: white;
            transition: 0.3s;
        }
        .car-card:hover { transform: scale(1.05); background: rgba(255, 255, 255, 0.15); }
        .car-price { font-size: 24px; color: #f2f2f2; font-weight: bold; margin: 10px 0; }
        .car-info { font-size: 14px; opacity: 0.8; }
        .nav-header { position: absolute; top: 20px; right: 40px; color: white; }
    </style>
</head>
<body class="background">
    <div class="nav-header">
        <span>Bienvenido, <strong>{{ usuario.Nombre }}</strong></span> |
        <a href="/logout" style="color: #ff4d4d; text-decoration: none;">Cerrar Sesión</a>
    </div>

    <h1 style="margin-top: 80px;">CATÁLOGO DE VEHÍCULOS</h1>

    <div class="catalogo-container">
        {% for coche in coches %}
        <div class="car-card">
            <img src="{{ url_for('static', filename='fondo.jpg') }}" style="width: 100%; border-radius: 10px; margin-bottom: 15px;">
            <h2>{{ coche['marca'] }}</h2>
            <p>{{ coche['modelo'] }}</p>
            <div class="car-price">{{ "{:,.0f}".format(coche['precio']) }} €</div>
            <div class="car-info">{{ coche['kilometraje'] }} KM</div>
            <button class="btn" style="width: 100%; margin-top: 15px; font-size: 16px;">DETALLES</button>
        </div>
        {% endfor %}
    </div>
</body>
</html>
