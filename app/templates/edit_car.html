<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Coche</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='manageUsers.css') }}">
    <style>
        .pokedex-main-container { height: auto !important; max-height: 80vh; overflow-y: auto; padding-top: 30px !important; }
        .form-group { margin-bottom: 15px; text-align: left; width: 100%; max-width: 400px; }
        .form-group label { display: block; font-size: 20px; margin-bottom: 5px; color: #333; font-family: 'Roboto Condensed', sans-serif; text-shadow: none; }
        .form-group input { width: 100% !important; padding: 10px 15px !important; border-radius: 8px; border: 1px solid #ccc !important; font-size: 18px !important; box-sizing: border-box; box-shadow: none !important; background-color: #fff !important; text-align: left !important; margin-top: 0 !important; }
        .form-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .Botones .btn { margin-top: 15px !important; font-size: 22px !important; padding: 10px 40px !important; }
        h2 { margin-bottom: 20px !important; font-size: 30px !important; text-align: center; }
    </style>
</head>
<body class="background">
    
    <!-- Botón para regresar a la gestión de coches -->
    <a href="/manage_cars"> 
        <img src="{{ url_for('static', filename='return.png') }}" class="flecha" alt="Volver atrás">
    </a>

    <div class="top-bar">
        <div class="top-left">
            <h1>PANEL DE ADMINISTRADOR</h1>
        </div>
        <div class="top-right">
            <h1>EDITAR COCHE</h1>
        </div>
    </div>

    <!-- Contenedor principal -->
    <div class="pokedex-main-container" style="flex-direction: column; justify-content: flex-start; align-items: center;">
        <h2>Modifica los datos del vehículo</h2>
        
        <form action="/edit_car/{{ coche.idCoche }}" method="POST" class="form-container" enctype="multipart/form-data">
            <div class="form-group">
                <label for="marca">Marca:</label>
                <input type="text" id="marca" name="marca" required value="{{ coche.marca }}">
            </div>
            <div class="form-group">
                <label for="modelo">Modelo:</label>
                <input type="text" id="modelo" name="modelo" required value="{{ coche.modelo }}">
            </div>
            <div class="form-group">
                <label for="precio">Precio (€):</label>
                <input type="number" id="precio" name="precio" required value="{{ '{:.2f}'.format(coche.precio) }}" step="0.01">
            </div>
            <div class="form-group">
                <label for="kilometraje">Kilometraje (km):</label>
                <input type="number" id="kilometraje" name="kilometraje" required value="{{ coche.kilometraje }}">
            </div>
            <div class="form-group">
                <label for="imagen">Cambiar imagen (opcional):</label>
                <input type="file" id="imagen" name="imagen" accept="image/*" style="padding: 5px 10px !important;">
            </div>
            
            <div class="Botones" style="margin-top: 20px;">
                <button type="submit" class="btn">Guardar Cambios</button>
            </div>
        </form>
    </div>
</body>
</html>
