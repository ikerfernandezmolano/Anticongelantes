<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Modificar Datos </title>
    <link rel="stylesheet" href="{{ url_for('static', filename='signin-reg.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
</head>
<body class="background">
    <a href="/catalogo" class="back-btn">
            ←
    </a>
    <div class="Cuerpo"> 
      <h1>MODIFICAR DATOS</h1>
      {% for category, mensaje in mensajes %}
          <label class="message {{ category }}">{{ mensaje }}</label>
      {% endfor %}
      <form action="/modificarDatos" method="POST">
          <div class="Cuerpo">
              <input type="email" id="email" name="email" placeholder="CORREO ELECTRÓNICO" value="{{ usuario_sesion.Email }}" required>
              <input type="password" id="password_old" name="password_old" placeholder="CONTRASEÑA ACTUAL">
              <input type="password" id="password_new" name="password_new" placeholder="NUEVA CONTRASEÑA">

          </div>
          <div class="Botones">
              <button type="submit" class="btn">CONFIRMAR</button>
          </div>
      </form>
  </div>
</body>
</html>
