<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Equipos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='equipos.css') }}">
</head>

<body class="background">

<a href="{{ url_for('pokedex.index') }}">
    <img src="{{ url_for('static', filename='return.png') }}" class="flecha">
</a>

<header class="top-bar">
    <div class="header-left"></div>

    <nav class="menu">
        <a href="#" class="menu-item">
            <img src="{{ url_for('static', filename='eevee.png') }}">
            <span>MI CUENTA</span>
        </a>
        <a href="#" class="menu-item">
            <img src="{{ url_for('static', filename='pikachu.png') }}">
            <span>MIS AMIGOS</span>
        </a>
        <a href="#" class="menu-item active">
            <img src="{{ url_for('static', filename='snorlax.png') }}">
            <span>EQUIPOS</span>
        </a>
    </nav>
</header>

<div class="container">

{% if equipo_activo %}
<div class="team-block">

    <div class="team-header">
        <form method="post"
              action="{{ url_for('equipos.modifyName', idEquipo=equipo_activo.IDEquipo) }}">
            <input type="text"
                   name="nombre"
                   value="{{ equipo_activo.Nombre }}"
                   class="team-name-input"
                   onchange="this.form.submit()">
        </form>
    </div>

    <div class="team-row">
    {% for i in range(6) %}
        {% set poke = equipo_activo.pokemon | selectattr("Slot", "equalto", i) | list %}
        <form method="post"
              action="{{ url_for('equipos.OpcionesModificarPokemon', idEquipo=equipo_activo.IDEquipo) }}"
              class="slot-form">
            <input type="hidden" name="slot" value="{{ i }}">

            <div class="slot-click" tabindex="0">
                {% if poke %}
                    <img src="{{ poke[0].Sprite }}" class="pokemon">
                {% else %}
                    <div class="slot">+</div>
                {% endif %}

                <select name="idPokemon" onchange="this.form.submit()">
                    <option value="__empty__" {% if not poke %}selected{% endif %}>Eliminar</option>
                    {% for p in pokedex %}
                        <option value="{{ p.IDPokemon }}" 
                            {% if poke and poke[0].IDPokemon == p.IDPokemon %}selected{% endif %}>
                            {{ p.Nombre }}
                        </option>
                    {% endfor %}
                </select>

            </div>
        </form>
    {% endfor %}
    </div>

    <div class="team-actions">
        <form method="post"
              action="{{ url_for('equipos.deleteEquipo', idEquipo=equipo_activo.IDEquipo) }}">
            <button class="delete">ELIMINAR</button>
        </form>
    </div>

</div>
{% endif %}

<div class="teams-list">
    {% for equipo in equipos %}
        <a href="{{ url_for('equipos.cargar_equipos', equipo_id=equipo.IDEquipo) }}" class="ball">
            <img src="{{ url_for('static', filename='pokeball.png') }}" class="ball-img">
            <span>{{ equipo.Nombre }}</span>
        </a>
    {% endfor %}

    <form method="post" action="{{ url_for('equipos.create_equipo') }}">
        <input type="hidden" name="nombre" value="Equipo {{ equipos|length + 1 }}">
        <button type="submit" class="ball new">
            <img src="{{ url_for('static', filename='pokeball.png') }}" class="ball-img">
            <div class="plus">+</div>
            <span>NUEVO<br>EQUIPO</span>
        </button>
    </form>
</div>

<div class="red-line"></div>

</div>
</body>
</html>
