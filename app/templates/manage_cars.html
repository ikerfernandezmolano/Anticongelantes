<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Coches</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='manageUsers.css') }}">
</head>
<body class="background">
    
    <a href="/admin_panel"> 
        <img src="{{ url_for('static', filename='return.png') }}" class="flecha" alt="Volver atrás">
    </a>

    <div class="top-bar">
        <div class="top-left">
            <h1>PANEL DE ADMINISTRADOR</h1>
        </div>
        <div class="top-right">
            <h1>GESTIÓN DE COCHES</h1>
        </div>
    </div>

    <div class="pokedex-main-container">
        <div style="flex: 1; overflow-y: auto; padding: 20px;">
            
            <!-- Botón Añadir Coche -->
            <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
                <a href="/add_car" class="btn" style="background:#28a745; color: white; text-decoration: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; font-family: 'Roboto Condensed', sans-serif; display: flex; align-items: center; gap: 10px; margin-top: 0;">
                    <span style="font-size: 24px; line-height: 1;">+</span> AÑADIR NUEVO COCHE
                </a>
            </div>

            {% for coche in coches %}
            <div class="usuario-row" style="display: flex; justify-content: space-between; align-items: center; background: #fdfdfd; padding: 15px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 15px;">
                
                <!-- Imagen y Datos -->
                <div style="display: flex; align-items: center; gap: 20px;">
                    <img src="{{ url_for('static', filename=coche.imagen) }}" alt="Coche" style="width: 100px; height: 70px; object-fit: contain; border-radius: 10px; background: rgba(0,0,0,0.05);" onerror="this.src='/static/fondo.jpg'">
                    <div>
                        <p style="font-size: 20px; font-weight: bold; margin: 0; font-family: 'Roboto Condensed', sans-serif;">{{ coche.marca }} {{ coche.modelo }}</p>
                        <p style="font-size: 16px; color: #555; margin: 5px 0 0 0; font-family: sans-serif;">ID: {{ coche.idCoche }} | {{ coche.kilometraje }} km | {{ "{:,.0f}".format(coche.precio) | replace(',', '.') }} €</p>
                    </div>
                </div>

                <!-- Botones de Acción -->
                <div style="display: flex; gap: 10px;">
                    <a href="/edit_car/{{ coche.idCoche }}" class="btn" style="background:#ffc107; color: #000; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-family: 'Roboto Condensed', sans-serif;">
                        EDITAR
                    </a>
                    <button class="btn" style="background:#ff4d4d; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-family: 'Roboto Condensed', sans-serif; cursor: pointer;"
                        onclick="if(confirm('¿Seguro que quieres eliminar este coche?')) window.location.href='/delete_car/{{ coche.idCoche }}'">
                        ELIMINAR
                    </button>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
